name: Raid Defense
description: Defend against multiple raids over 15 days. Combat readiness is key.
difficulty: hard
expected_duration_days: 15
initial_population: 5
max_ticks: 150
save_name: rle_raid_defense_v1

victory_conditions:
  - metric: days_survived
    operator: ">="
    value: 15
  - metric: survival_rate
    operator: ">="
    value: 0.6

failure_conditions:
  - metric: all_colonists_dead
    operator: "=="
    value: 1
  - metric: survival_rate
    operator: "<"
    value: 0.2

scoring_weights:
  survival: 0.20
  threat_response: 0.24
  mood: 0.08
  food_security: 0.04
  wealth: 0.04
  research: 0.04
  self_sufficiency: 0.08
  efficiency: 0.08
  coordination: 0.15
  communication_efficiency: 0.05
