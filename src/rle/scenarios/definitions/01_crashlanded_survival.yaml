name: Crashlanded Survival
description: Three colonists crash-land with minimal supplies. Survive 30 days.
difficulty: easy
expected_duration_days: 30
initial_population: 3
max_ticks: 300
save_name: rle_crashlanded_v1

victory_conditions:
  - metric: days_survived
    operator: ">="
    value: 30
  - metric: survival_rate
    operator: ">="
    value: 0.33

failure_conditions:
