    operator: "=="
    value: 1

scoring_weights:
  survival: 0.30
  food_security: 0.15
  mood: 0.15
  threat_response: 0.10
  wealth: 0.05
  research: 0.05
  self_sufficiency: 0.15
  efficiency: 0.05
