name: First Winter
description: Survive through the first winter with adequate food and shelter.
difficulty: medium
expected_duration_days: 60
initial_population: 3
max_ticks: 600
save_name: rle_first_winter_v1

victory_conditions:
  - metric: days_survived
    operator: ">="
    value: 60
  - metric: food_days
    operator: ">="
    value: 3

failure_conditions:
  - metric: all_colonists_dead
    operator: "=="
    value: 1
  - metric: food_days
    operator: "<="
    value: 0

scoring_weights:
  survival: 0.20
  food_security: 0.16
  self_sufficiency: 0.12
  mood: 0.08
  wealth: 0.08
  research: 0.04
  threat_response: 0.08
  efficiency: 0.04
  coordination: 0.12
  communication_efficiency: 0.08
