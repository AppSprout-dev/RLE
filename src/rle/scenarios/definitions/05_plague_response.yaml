name: Plague Response
description: A plague hits the colony. Manage medicine and prevent deaths.
difficulty: hard
expected_duration_days: 20
initial_population: 5
max_ticks: 200
save_name: rle_plague_response_v1

victory_conditions:
  - metric: days_survived
    operator: ">="
    value: 20
  - metric: survival_rate
    operator: ">="
    value: 0.8

failure_conditions:
  - metric: all_colonists_dead
    operator: "=="
    value: 1
  - metric: survival_rate
    operator: "<"
    value: 0.4

scoring_weights:
  survival: 0.28
  mood: 0.12
  food_security: 0.08
  threat_response: 0.08
  wealth: 0.04
  research: 0.04
  self_sufficiency: 0.08
  efficiency: 0.08
  coordination: 0.12
  communication_efficiency: 0.08
