name: Plague Response
description: A plague hits the colony. Manage medicine and prevent deaths.
difficulty: hard
expected_duration_days: 20
initial_population: 5
max_ticks: 200

victory_conditions:
  - metric: days_survived
    operator: ">="
    value: 20
  - metric: survival_rate
    operator: ">="
    value: 0.8

failure_conditions:
  - metric: all_colonists_dead
    operator: "=="
    value: 1
  - metric: survival_rate
    operator: "<"
    value: 0.4

scoring_weights:
  survival: 0.35
  mood: 0.15
  food_security: 0.10
  threat_response: 0.10
  wealth: 0.05
  research: 0.05
  self_sufficiency: 0.10
  efficiency: 0.10
